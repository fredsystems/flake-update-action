name: CI

on:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      # --- Install Nix via Determinate Systems ---
      - name: Set up Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3

      - name: Use Determinate Cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
          use-gha-cache: false

      # --- Enter your flake's devShell (same behavior as direnv) ---
      - name: Run checks in devShell
        run: |
          nix develop --impure --command bash -e -c '
            set -euxo pipefail
            pre-commit run --all-files
          '
